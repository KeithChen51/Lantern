<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>案例墙一｜真实选择，正在定义服务</title>
  <style>
    @font-face {
      font-family: "FZBenYueSong";
      src: url("../../brand-vi-and-training/brand-vi/vi-assets/fonts/fz-qingke-benyuesong.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "FZLanTing";
      src: url("../../brand-vi-and-training/brand-vi/vi-assets/fonts/fz-lanting-hei.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "FZLanTing";
      src: url("../../brand-vi-and-training/brand-vi/vi-assets/fonts/fz-lanting-cuhei.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "BYDType";
      src: url("../../brand-vi-and-training/brand-vi/vi-assets/fonts/bydtype-medium.otf") format("opentype");
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --trust-ink: #141B25;
      --seal-red: #8F2F2A;
      --order-gray: #595757;
      --paper: #FBFAF6;
      --paper-shadow: #F1EEE7;
      --kindness-gold: #BE9457;
      --text: rgba(20, 27, 37, 0.92);
      --muted: rgba(89, 87, 87, 0.82);
      --quiet: rgba(89, 87, 87, 0.58);
      --line: rgba(89, 87, 87, 0.18);
      --font-display: "FZBenYueSong", "Songti SC", "SimSun", serif;
      --font-body: "FZLanTing", "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      --font-latin: "BYDType", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { min-width: 320px; background: var(--paper-shadow); }

    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(190, 148, 87, 0.13), transparent 28%),
        linear-gradient(180deg, var(--paper) 0%, var(--paper-shadow) 100%);
      font-family: var(--font-body);
      letter-spacing: 0;
      font-synthesis: none;
    }

    .wall-stage {
      min-height: 100vh;
      padding: clamp(28px, 5vw, 76px) clamp(18px, 5vw, 84px) 72px;
    }

    .case-wall {
      width: min(100%, 1480px);
      margin: 0 auto;
    }

    .wall-heading {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(220px, 0.62fr);
      gap: clamp(28px, 7vw, 120px);
      align-items: end;
      margin-bottom: clamp(26px, 4vw, 54px);
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--seal-red);
      font-family: var(--font-latin);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      line-height: 1.2;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      color: var(--trust-ink);
      font-family: var(--font-display);
      font-size: clamp(32px, 4.6vw, 68px);
      font-weight: 400;
      line-height: 1.14;
    }

    .wall-intro {
      margin: 0;
      color: var(--muted);
      font-size: clamp(15px, 1.4vw, 19px);
      line-height: 1.75;
    }

    .wall-intro strong {
      display: block;
      margin-bottom: 6px;
      color: var(--trust-ink);
      font-size: 0.8em;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(14px, 2vw, 28px);
    }

    .case-card {
      position: relative;
      overflow: hidden;
      aspect-ratio: 210 / 297;
      display: flex;
      flex-direction: column;
      padding: clamp(20px, 2.2vw, 34px) clamp(18px, 2.2vw, 34px) clamp(18px, 2vw, 30px);
      border: 1px solid rgba(89, 87, 87, 0.22);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.97), rgba(251, 250, 246, 0.97) 67%, rgba(241, 238, 231, 0.96));
      box-shadow: 0 16px 34px rgba(20, 27, 37, 0.09);
      isolation: isolate;
    }

    .case-card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: 0.48;
      background:
        linear-gradient(rgba(20, 27, 37, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 27, 37, 0.035) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    .case-card::after {
      content: "";
      position: absolute;
      right: -18%;
      bottom: -2%;
      z-index: -1;
      width: 90%;
      height: 40%;
      opacity: 0.07;
      background: url("../../brand-vi-and-training/brand-vi/vi-assets/pattern-backgrounds/huiwen-mask.png") center bottom / cover no-repeat;
      -webkit-mask-image: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.8) 62%, transparent);
      mask-image: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.8) 62%, transparent);
      pointer-events: none;
    }

    .case-card > .top-rule {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: var(--seal-red);
    }

    .case-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      padding-top: 4px;
      color: var(--quiet);
      font-family: var(--font-latin);
      font-size: clamp(11px, 1vw, 14px);
      font-weight: 600;
      line-height: 1.2;
    }

    .case-number {
      color: var(--seal-red);
      font-size: clamp(22px, 2.8vw, 42px);
      line-height: 1;
    }

    .case-label { white-space: nowrap; }

    .case-copy {
      display: flex;
      flex: 1;
      flex-direction: column;
      justify-content: center;
      gap: clamp(12px, 1.8vw, 24px);
      padding: 8% 0 5%;
    }

    .case-copy h2 {
      margin: 0;
      color: var(--trust-ink);
      font-family: var(--font-display);
      font-size: clamp(22px, 2.6vw, 39px);
      font-weight: 400;
      line-height: 1.26;
    }

    .case-copy p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(13px, 1.25vw, 18px);
      line-height: 1.72;
    }

    .case-footer {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      padding-top: 14px;
      border-top: 1px dashed rgba(89, 87, 87, 0.28);
    }

    .case-footer small {
      max-width: 8em;
      color: var(--quiet);
      font-size: clamp(10px, 0.9vw, 13px);
      line-height: 1.5;
    }

    .qr-entry {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      padding: 4px 0;
      border: 0;
      color: var(--seal-red);
      background: transparent;
      cursor: pointer;
      font: inherit;
      font-size: clamp(10px, 0.92vw, 13px);
      line-height: 1.3;
      text-align: left;
    }

    .qr-entry:hover { color: var(--trust-ink); }

    .qr-entry:focus-visible {
      outline: 2px solid var(--kindness-gold);
      outline-offset: 5px;
      border-radius: 2px;
    }

    .qr-pattern {
      flex: 0 0 auto;
      width: clamp(30px, 3.3vw, 48px);
      aspect-ratio: 1;
      border: 3px solid var(--trust-ink);
      background:
        linear-gradient(90deg, var(--trust-ink) 20%, transparent 20% 40%, var(--trust-ink) 40% 58%, transparent 58% 72%, var(--trust-ink) 72%),
        linear-gradient(var(--trust-ink) 18%, transparent 18% 35%, var(--trust-ink) 35% 52%, transparent 52% 70%, var(--trust-ink) 70%);
      box-shadow: inset 5px 5px 0 var(--paper), inset -5px -5px 0 var(--paper);
    }

    #qr-status {
      min-height: 1.5em;
      margin: 24px 0 0;
      color: var(--seal-red);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 900px) {
      .wall-heading { grid-template-columns: 1fr; gap: 14px; }
      .case-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .case-copy h2 { font-size: clamp(25px, 4vw, 38px); }
      .case-copy p { font-size: clamp(14px, 1.9vw, 17px); }
    }

    @media (max-width: 620px) {
      .wall-stage { padding: 26px 16px 48px; }
      .case-grid { grid-template-columns: 1fr; }
      .case-card { min-height: 420px; }
      .case-copy h2 { font-size: 32px; }
      .case-copy p { font-size: 16px; }
      .qr-entry { font-size: 13px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; }
    }

    @media print {
      body { background: #fff; }
      .wall-stage { padding: 12mm; }
      .wall-heading { break-after: avoid; }
      .case-card { box-shadow: none; break-inside: avoid; }
      #qr-status { display: none; }
    }
  </style>
</head>
<body>
  <main class="wall-stage">
    <section class="case-wall" aria-labelledby="wall-title">
      <header class="wall-heading">
        <div>
          <p class="eyebrow">精诚服务二十周年 · 案例墙一</p>
          <h1 id="wall-title">真实选择，正在定义服务</h1>
        </div>
        <p class="wall-intro">
          <strong>服务现场的九个十字路口</strong>
          价值框架贯穿于服务客户、对待员工、组织协作和经营管理的全过程。以下案例，记录精诚服务在真实现场形成的判断。
        </p>
      </header>

      <div class="case-grid" id="case-grid"></div>
      <p id="qr-status" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const cases = [
      { number: "01", title: "诚信经营", summary: "用诊断、透明告知和客户确认，守住推荐边界。" },
      { number: "02", title: "取送车司机休息区", summary: "让服务链条上的协作者，也被体面接待。" },
      { number: "03", title: "取送车客诉处理", summary: "承担应承担的责任，不以无原则妥协换满意。" },
      { number: "04", title: "服务顾问用餐空间", summary: "保障员工体面用餐，也保护客户的专业感知。" },
      { number: "05", title: "车间降温", summary: "降温不是成本负担，而是质量、安全与效能投资。" },
      { number: "06", title: "通往客休区的楼梯", summary: "守住尺度、照明与防滑，守住客户的基础安全感。" },
      { number: "07", title: "顾问身后的空间", summary: "给员工转身空间，也给服务质量留出余地。" },
      { number: "08", title: "茶几上的插座", summary: "让一线敢于发现问题，也让善意反馈得到回应。" },
      { number: "09", title: "客休区售卖边界", summary: "保持休息空间的纯粹，克制本身也是服务品质。" }
    ];

    const grid = document.querySelector("#case-grid");
    const status = document.querySelector("#qr-status");

    grid.innerHTML = cases.map((item) => `
      <article class="case-card" aria-labelledby="case-title-${item.number}">
        <span class="top-rule" aria-hidden="true"></span>
        <div class="case-meta">
          <span class="case-number">${item.number}</span>
          <span class="case-label">案例卡</span>
        </div>
        <div class="case-copy">
          <h2 id="case-title-${item.number}">${item.title}</h2>
          <p>${item.summary}</p>
        </div>
        <footer class="case-footer">
          <small>精诚服务<br />二十周年</small>
          <button class="qr-entry" type="button" aria-label="扫码阅读完整案例：${item.title}">
            <span class="qr-pattern" aria-hidden="true"></span>
            <span>扫码阅读完整案例</span>
          </button>
        </footer>
      </article>
    `).join("");

    grid.addEventListener("click", (event) => {
      const button = event.target.closest(".qr-entry");
      if (!button) return;
      status.textContent = "完整案例链接待接入";
    });
  </script>
</body>
</html>
